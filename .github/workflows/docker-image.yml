name: Docker Image Build and Push

on:
  push:
    branches: [master]
    paths:
      - 'scripts/**'
      - 'Dockerfile-for-github-action'
      - 'requirements.txt'
      - 'config.yaml'
      - '.github/workflows/docker-image.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'version'
        required: false
        type: string

env:
  DOCKERHUB_REPO: aadooo/sgcc_electricity

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            INPUT_VERSION="${{ inputs.version }}"
          else
            INPUT_VERSION=$(python3 -c "
          import yaml
          with open('config.yaml') as f:
              config = yaml.safe_load(f)
          print(config.get('version', ''))
          " | tr -d '[:space:]')
          fi

          if [[ $INPUT_VERSION != v* ]]; then
            NEW_VERSION="v${INPUT_VERSION}"
          else
            NEW_VERSION="$INPUT_VERSION"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $NEW_VERSION"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push amd64
        run: |
          VERSION=${{ steps.version.outputs.version }}
          docker buildx build --platform linux/amd64 \
            --tag ${DOCKERHUB_REPO}-amd64:${VERSION} \
            --tag ${DOCKERHUB_REPO}-amd64:latest \
            --file Dockerfile-for-github-action --push .

      - name: Build and push arm64
        run: |
          VERSION=${{ steps.version.outputs.version }}
          docker buildx build --platform linux/arm64 \
            --tag ${DOCKERHUB_REPO}-aarch64:${VERSION} \
            --tag ${DOCKERHUB_REPO}-aarch64:latest \
            --file Dockerfile-for-github-action --push .
